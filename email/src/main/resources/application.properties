spring.application.name=email-sender
server.port=8081

logging.level.org.apache.kafka=INFO
logging.level.com.tasktracker=TRACE

logging.level.org.springframework.kafka.listener.KafkaMessageListenerContainer=DEBUG
logging.level.org.springframework.kafka.listener.MessageListenerContainer=DEBUG
logging.level.org.springframework.kafka.config.KafkaListenerEndpointRegistry=DEBUG

spring.kafka.bootstrap-servers=kafka:29093
spring.kafka.consumer.group-id=email-sender-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.type.mapping=emailMessage:com.tasktracker.dto.EmailMessage

spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false

logging.level.org.springframework.kafka=DEBUG

my.spring.kafka.topic.name=EMAIL_SENDING_TASKS
my.spring.kafka.group=email-sender-group
